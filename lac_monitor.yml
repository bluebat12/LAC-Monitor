name: LAC Monitor

on:
  schedule:
    - cron: '0 0 * * *'    # 北京 08:00
    - cron: '0 12 * * *'   # 北京 20:00
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests feedparser

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: seen_filings.json
          key: lac-state
          restore-keys: lac-state

      - name: Run monitor
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
          BARK_SERVER: ${{ secrets.BARK_SERVER }}
        run: python lac_monitor.py

      - name: Save state cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: seen_filings.json
          key: lac-state
